<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Recommendation System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <h1>BurakDalkılınç</h1>
        <span class="header-subtitle">Graph-based movie recommendations · BFS traversal</span>
      </div>
      <div class="header-badges">
        <span class="badge">Graph</span>
        <span class="badge">Hash Map</span>
        <span class="badge">BFS</span>
      </div>
    </div>
  </header>

  <main class="main-layout">

    <!-- Left: Movie browser -->
    <section class="panel panel-browser">
      <div class="panel-header">
        <h2>Movies</h2>
        <div id="genreFilters"></div>
      </div>
      <div class="movie-grid" id="movieGrid"></div>
    </section>

    <!-- Right: Selected + Recommendations -->
    <div class="panel-results">

      <div id="selectedMoviePanel">
        <div class="selected-empty">
          <div class="selected-empty-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
            </svg>
          </div>
          <p>Select a movie from the list to begin</p>
        </div>
      </div>

      <div class="recs-section">
        <div class="recs-header">
          <h3>Recommendations</h3>
          <span class="recs-subtitle">scored by BFS depth + genre overlap + rating</span>
        </div>
        <div id="recommendationsList">
          <div class="recs-empty">Run BFS to discover recommendations</div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/bfs.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
